<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シドニー - 量子脳コーチング AIアシスタント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Orbitron:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; overflow: hidden;
  }
  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 420px; padding: 20px;
  }
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; letter-spacing: 4px; color: #d4a8ff;
    text-transform: uppercase; margin-bottom: 6px; opacity: 0.8;
  }
  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px; font-weight: 700;
    background: linear-gradient(135deg, #ff9de2, #c77dff, #79d0ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 24px; letter-spacing: 6px;
  }
  .avatar-container { position: relative; width: 240px; height: 300px; margin-bottom: 20px; }
  .avatar-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 320px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(199,125,255,0.15) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  }
  .avatar-img {
    position: absolute; top: 0; left: 0;
    width: 240px; height: 300px;
    object-fit: cover;
    border-radius: 120px 120px 80px 80px;
    transition: opacity 0.1s ease;
    filter: drop-shadow(0 0 20px rgba(199,125,255,0.4));
  }
  #img-closed { opacity: 1; }
  #img-open { opacity: 0; }
  .avatar-container.speaking #img-closed { opacity: 0; }
  .avatar-container.speaking #img-open { opacity: 1; }
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px; font-size: 13px; color: rgba(255,255,255,0.6);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; transition: background 0.3s;
  }
  .status-dot.active {
    background: #7fff7f; box-shadow: 0 0 8px #7fff7f;
    animation: blink 1s ease-in-out infinite;
  }
  .status-dot.listening {
    background: #ff9de2; box-shadow: 0 0 8px #ff9de2;
    animation: blink 0.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .btn-talk {
    width: 72px; height: 72px; border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #c77dff, #ff9de2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 30px rgba(199,125,255,0.5);
    transition: all 0.3s; margin-bottom: 12px;
  }
  .btn-talk:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(199,125,255,0.7); }
  .btn-talk:active { transform: scale(0.95); }
  .btn-talk.recording {
    background: linear-gradient(135deg, #ff5555, #ff9de2);
    animation: recording-pulse 1s ease-in-out infinite;
  }
  @keyframes recording-pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,85,85,0.5); }
    50% { box-shadow: 0 0 50px rgba(255,85,85,0.8); }
  }
  .btn-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 24px; letter-spacing: 1px; }
  .error-msg {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 12px; padding: 12px 16px;
    font-size: 13px; color: #ffaaaa;
    text-align: center; display: none; margin-top: 12px;
  }
  .footer { margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="container">
  <div class="title">量子脳コーチング</div>
  <div class="name">SYDNEY</div>

  <div class="avatar-container" id="avatar">
    <div class="avatar-glow"></div>
    <img id="img-closed" class="avatar-img" src="sydney_closed.png" alt="シドニー">
    <img id="img-open" class="avatar-img" src="sydney_open.jpg" alt="シドニー話中">
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">タップして話しかけてね!</span>
