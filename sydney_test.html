<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemini Live - Direct Connection</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; margin: 0; }
        #status { margin-bottom: 20px; font-weight: bold; color: #555; }
        #visualizer { width: 300px; height: 100px; background: #000; border-radius: 10px; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 50px; background: #1a73e8; color: white; transition: 0.3s; }
        button:disabled { background: #ccc; }
        button:hover:not(:disabled) { background: #1557b0; }
        .log { width: 80%; max-height: 200px; overflow-y: auto; font-size: 12px; background: #fff; padding: 10px; border: 1px solid #ddd; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="status">準備完了</div>
    <canvas id="visualizer"></canvas>
    <button id="startBtn">会話を開始する</button>
    <div id="log" class="log">システムログ...</div>

    <script>
        const API_KEY = 'AIzaSyBXx3NVavo8BPIsE0fhlAXHJLqtfanSNLM';
        // WebSocketのURL（APIキーをクエリパラメータで渡すことでヘッダー制限を回避）
        const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${API_KEY}`;

        let ws;
        let audioContext;
        let stream;
        let processor;

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');

        function log(msg) {
            logDiv.innerText += `\n${new Date().toLocaleTimeString()}: ${msg}`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            statusDiv.innerText = "接続中...";
            
            try {
                // 1. WebSocket接続
                ws = new WebSocket(URL);
                ws.onopen = () => {
                    log("WebSocket接続成功");
                    statusDiv.innerText = "会話中...";
                    
                    // 初期設定メッセージを送信
                    const setup = {
                        setup: { model: "models/gemini-2.0-flash-exp" }
                    };
                    ws.send(JSON.stringify(setup));
                    startAudio();
                };

                ws.onmessage = async (event) => {
                    const response = JSON.parse(await event.data.text());
                    if (response.serverContent && response.serverContent.modelTurn) {
                        const parts = response.serverContent.modelTurn.parts;
                        parts.forEach(part => {
                            if (part.inlineData) {
                                playRawAudio(part.inlineData.data);
                            }
                        });
                    }
                };

                ws.onerror = (e) => log("WebSocketエラー: " + e.message);
                ws.onclose = () => {
                    log("接続が閉じられました");
                    stopAudio();
                    startBtn.disabled = false;
                    statusDiv.innerText = "終了しました";
                };

            } catch (err) {
                log("エラー: " + err);
                startBtn.disabled = false;
            }
        };

        async function startAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            
            // 16kHz PCMデータを抽出するためのプロセッサ
            processor = audioContext.createScriptProcessor(4096, 1, 1);
            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Float32をInt16に変換
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    // Base64で送信
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
                    ws.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{
                                data: base64Audio,
                                mimeType: "audio/pcm;rate=16000"
                            }]
                        }
                    }));
                }
            };
        }

        function stopAudio() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (processor) processor.disconnect();
            if (audioContext) audioContext.close();
        }

        // 受信したBase64オーディオを再生
        function playRawAudio(base64Data) {
            const binary = atob(base64Data);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 0x7FFF;

            const buffer = audioContext.createBuffer(1, float32.length, 16000);
            buffer.getChannelData(0).set(float32);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
        }
    </script>
</body>
</html>
