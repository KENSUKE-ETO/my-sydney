<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シドニー - 量子脳コーチング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Orbitron:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: #d4a8ff;
    margin-bottom: 6px;
  }
  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, #ff9de2, #c77dff, #79d0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    letter-spacing: 6px;
  }
  .avatar-container {
    position: relative;
    width: 240px;
    height: 300px;
    margin-bottom: 20px;
  }
  .avatar-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(199,125,255,0.15) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  }
  .avatar-img {
    position: absolute;
    top: 0; left: 0;
    width: 240px; height: 300px;
    object-fit: cover;
    border-radius: 120px 120px 80px 80px;
    transition: opacity 0.1s ease;
    filter: drop-shadow(0 0 20px rgba(199,125,255,0.4));
  }
  #img-closed { opacity: 1; }
  #img-open { opacity: 0; }
  .speaking #img-closed { opacity: 0; }
  .speaking #img-open { opacity: 1; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .status-dot.active { background: #7fff7f; box-shadow: 0 0 8px #7fff7f; animation: blink 1s infinite; }
  .status-dot.speaking-dot { background: #ff9de2; box-shadow: 0 0 8px #ff9de2; animation: blink 0.5s infinite; }
  .status-dot.listening-dot { background: #79d0ff; box-shadow: 0 0 8px #79d0ff; animation: blink 0.7s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .wave-container {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 30px;
    margin-bottom: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .wave-container.active { opacity: 1; }
  .wave-bar {
    width: 4px;
    background: linear-gradient(to top, #c77dff, #ff9de2);
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
    height: 6px;
  }
  .wave-bar:nth-child(1){animation-delay:0s} .wave-bar:nth-child(2){animation-delay:0.1s}
  .wave-bar:nth-child(3){animation-delay:0.2s} .wave-bar:nth-child(4){animation-delay:0.3s}
  .wave-bar:nth-child(5){animation-delay:0.4s} .wave-bar:nth-child(6){animation-delay:0.3s}
  .wave-bar:nth-child(7){animation-delay:0.2s} .wave-bar:nth-child(8){animation-delay:0.1s}
  .wave-bar:nth-child(9){animation-delay:0s}
  @keyframes wave { 0%, 100% { height: 6px; } 50% { height: 28px; } }

  /* ── ボタンエリア ── */
  .btn-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-talk {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #c77dff, #ff9de2);
    cursor: pointer;
    font-size: 28px;
    box-shadow: 0 0 30px rgba(199,125,255,0.5);
    transition: all 0.3s;
  }
  .btn-talk:hover { transform: scale(1.05); }
  .btn-talk.recording {
    background: linear-gradient(135deg, #ff5555, #ff9de2);
    box-shadow: 0 0 30px rgba(255,85,85,0.6);
    animation: pulse-btn 1s infinite;
  }
  .btn-talk:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
  @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* 停止ボタン */
  .btn-stop {
    padding: 8px 24px;
    border-radius: 20px;
    border: 1px solid rgba(255,100,100,0.5);
    background: rgba(255,80,80,0.15);
    color: #ffaaaa;
    font-size: 13px;
    font-family: 'Zen Maru Gothic', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    display: none;
  }
  .btn-stop:hover { background: rgba(255,80,80,0.3); }
  .btn-stop.show { display: block; }

  .btn-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .chat-bubble {
    background: rgba(199,125,255,0.1);
    border: 1px solid rgba(199,125,255,0.3);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 13px;
    text-align: center;
    max-width: 320px;
    margin-bottom: 12px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .chat-bubble.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .error-msg {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ffaaaa;
    text-align: center;
    display: none;
    max-width: 320px;
    margin-bottom: 12px;
  }
  .footer { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }
</style>
</head>
<body>
<div class="container">
  <div class="title">量子脳コーチング</div>
  <div class="name">SYDNEY</div>

  <div class="avatar-container" id="avatar">
    <div class="avatar-glow"></div>
    <img id="img-closed" class="avatar-img" src="sydney_closed.png" alt="シドニー">
    <img id="img-open" class="avatar-img" src="sydney_open.jpg" alt="シドニー話中">
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">タップして話しかけてね！</span>
  </div>

  <div class="wave-container" id="wave">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <div class="btn-area">
    <button class="btn-talk" id="btn-talk" onclick="toggleListen()">🎤</button>
    <div class="btn-label" id="btn-label">タップして話しかける</div>
    <!-- 停止ボタン：接続中のみ表示 -->
    <button class="btn-stop" id="btn-stop" onclick="disconnect()">⏹ 会話を終わる</button>
  </div>

  <div class="chat-bubble" id="chat-bubble"></div>
  <div class="error-msg" id="error-msg"></div>
  <div class="footer">Quantum Brain Coaching AI</div>
</div>

<script>
const WS_URL = 'wss://' + location.host;

let ws = null;
let isConnected = false;
let isListening = false;
let audioContext = null;
let audioQueue = [];
let isPlaying = false;
let lipSyncInterval = null;
let recognition = null;

const avatar     = document.getElementById('avatar');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const wave       = document.getElementById('wave');
const btnTalk    = document.getElementById('btn-talk');
const btnLabel   = document.getElementById('btn-label');
const btnStop    = document.getElementById('btn-stop');
const chatBubble = document.getElementById('chat-bubble');
const errorMsg   = document.getElementById('error-msg');

// ──────────────── UI ────────────────
function setStatus(state, text) {
  statusText.textContent = text;
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
}

function showBubble(text) {
  chatBubble.textContent = text;
  chatBubble.classList.add('show');
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
}

function setConnectedUI(connected) {
  // 停止ボタンの表示切替
  btnStop.classList.toggle('show', connected);
  if (connected) {
    btnTalk.textContent = '🎤';
    btnLabel.textContent = 'タップして話しかける';
  } else {
    btnTalk.textContent = '🎤';
    btnLabel.textContent = 'タップして接続・話しかける';
    btnTalk.classList.remove('recording');
    wave.classList.remove('active');
  }
}

// ──────────────── リップシンク ────────────────
function startLipSync() {
  stopLipSync();
  let open = false;
  lipSyncInterval = setInterval(() => {
    open = !open;
    avatar.classList.toggle('speaking', open);
  }, 180);
}

function stopLipSync() {
  if (lipSyncInterval) { clearInterval(lipSyncInterval); lipSyncInterval = null; }
  avatar.classList.remove('speaking');
}

// ──────────────── 音声再生 ────────────────
async function playNext() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    stopLipSync();
    if (isConnected) {
      setStatus('active', '話しかけてね！');
      // 再生終わったら自動でマイク再開
      setTimeout(() => { if (isConnected && !isListening) startListening(); }, 300);
    }
    return;
  }
  isPlaying = true;
  startLipSync();
  setStatus('speaking-dot', 'シドニーが話しているよ♪');

  // シドニーが話している間はマイクを止める
  stopListening();

  const data = audioQueue.shift();

  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') await audioContext.resume();

  const pcm16   = new Int16Array(data);
  const float32 = new Float32Array(pcm16.length);
  for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768.0;

  const audioBuf = audioContext.createBuffer(1, float32.length, 24000);
  audioBuf.copyToChannel(float32, 0);

  const src = audioContext.createBufferSource();
  src.buffer = audioBuf;
  src.connect(audioContext.destination);
  src.onended = playNext;
  src.start();
}

// ──────────────── 音声認識 ────────────────
function startListening() {
  if (isListening || isPlaying) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showError('このブラウザは音声認識に対応していません。Chromeをお使いください。');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening-dot', '聞いています...');
    wave.classList.add('active');
    btnTalk.classList.add('recording');
    btnLabel.textContent = '話しかけ中... (タップで一時停止)';
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    console.log('認識:', text);
    showBubble('あなた：' + text);

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        client_content: {
          turns: [{ role: 'user', parts: [{ text }] }],
          turn_complete: true
        }
      }));
    }
    setStatus('active', 'シドニーが考えています...');
    wave.classList.remove('active');
    btnTalk.classList.remove('recording');
    btnLabel.textContent = 'タップして話しかける';
  };

  recognition.onerror = (e) => {
    console.warn('音声認識エラー:', e.error);
    isListening = false;
    wave.classList.remove('active');
    btnTalk.classList.remove('recording');
    btnLabel.textContent = 'タップして話しかける';
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      showError('音声認識エラー: ' + e.error);
    }
  };

  recognition.onend = () => {
    isListening = false;
    wave.classList.remove('active');
    btnTalk.classList.remove('recording');
    btnLabel.textContent = 'タップして話しかける';
    // 接続中・再生中でなければ自動再開
    if (isConnected && !isPlaying) {
      setTimeout(() => { if (isConnected && !isPlaying) startListening(); }, 500);
    }
  };

  recognition.start();
}

function stopListening() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  isListening = false;
  wave.classList.remove('active');
  btnTalk.classList.remove('recording');
}

// ──────────────── WebSocket接続 ────────────────
async function connect() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') await audioContext.resume();

  setStatus('', '接続中...');
  btnTalk.disabled = true;

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('WebSocket接続成功');
  };

  ws.onmessage = async (event) => {
    const data = JSON.parse(event.data);

    // セットアップ完了
    if (data.setupComplete) {
      isConnected = true;
      btnTalk.disabled = false;
      setConnectedUI(true);
      setStatus('active', 'シドニーが挨拶中...');
      console.log('✅ セットアップ完了');
      // 挨拶音声が来るまで待つ（startListeningはplayNext終了後に自動で呼ばれる）
    }

    // 音声データ受信
    if (data.audio) {
      const binary = atob(data.audio);
      const buffer = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) buffer[i] = binary.charCodeAt(i);
      audioQueue.push(buffer.buffer);
      if (!isPlaying) playNext();
    }

    // ターン完了 → マイク再開
    if (data.turnComplete && !isPlaying && audioQueue.length === 0) {
      if (isConnected && !isListening) {
        setTimeout(() => startListening(), 300);
      }
    }

    // エラー
    if (data.error) {
      showError(data.error);
      console.error('サーバーエラー:', data.error);
    }
  };

  ws.onerror = (e) => {
    console.error('WebSocketエラー:', e);
    showError('接続エラーが発生しました');
    btnTalk.disabled = false;
  };

  ws.onclose = () => {
    isConnected = false;
    stopListening();
    audioQueue = [];
    isPlaying = false;
    stopLipSync();
    setConnectedUI(false);
    setStatus('', 'タップして再接続');
    console.log('WebSocket切断');
  };
}

// ──────────────── 切断（停止ボタン） ────────────────
function disconnect() {
  stopListening();
  audioQueue = [];
  isPlaying = false;
  stopLipSync();
  if (ws) {
    ws.close();
    ws = null;
  }
  isConnected = false;
  setConnectedUI(false);
  setStatus('', 'またね！タップして再開できるよ♪');
  chatBubble.classList.remove('show');
}

// ──────────────── マイクボタン ────────────────
async function toggleListen() {
  if (!isConnected) {
    // 未接続 → 接続開始
    await connect();
  } else if (isListening) {
    // 聞いている → 一時停止
    stopListening();
    setStatus('active', 'タップで再開するよ！');
    btnLabel.textContent = '一時停止中';
  } else if (isPlaying) {
    // 再生中はボタン無効（何もしない）
  } else {
    // 接続済み・停止中 → 再開
    startListening();
  }
}

// ──────────────── 初期化 ────────────────
window.onload = () => {
  setStatus('', 'タップして話しかけてね！');
};
</script>
</body>
</html>
