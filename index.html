<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>シドニー - 量子脳コーチング</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Orbitron:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0a1a2e 100%);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  color:#fff;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom);
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 10%,rgba(255,200,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 70%,rgba(200,200,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,.2) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* ── 名前入力画面 ── */
#name-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,#0a0a1a,#1a0a2e);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;padding:24px;
}
#name-screen h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#c77dff;margin-bottom:8px;letter-spacing:3px}
#name-screen p{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:24px;text-align:center}
#name-input{
  width:100%;max-width:300px;padding:14px 18px;
  background:rgba(255,255,255,.08);border:1px solid rgba(199,125,255,.4);
  border-radius:12px;color:#fff;font-size:16px;font-family:'Zen Maru Gothic',sans-serif;
  margin-bottom:16px;outline:none;
}
#name-input:focus{border-color:#c77dff;box-shadow:0 0 0 2px rgba(199,125,255,.2)}
#name-submit{
  width:100%;max-width:300px;padding:14px;
  background:linear-gradient(135deg,#c77dff,#ff9de2);
  border:none;border-radius:12px;color:#fff;font-size:16px;
  font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;
  box-shadow:0 0 20px rgba(199,125,255,.4);transition:transform .2s;
}
#name-submit:active{transform:scale(.97)}

/* ── メイン ── */
.container{
  position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;width:100%;max-width:420px;padding:16px 20px;
}

.title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:#d4a8ff;margin-bottom:4px;opacity:.8;margin-top:12px}
.name-logo{
  font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;
  background:linear-gradient(135deg,#ff9de2,#c77dff,#79d0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;letter-spacing:6px;
}

/* ── アバター ── */
.avatar-container{position:relative;width:220px;height:275px;margin-bottom:16px}

.avatar-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:240px;height:295px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(199,125,255,.15) 0%,transparent 70%);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}}

.quantum-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:260px;height:315px;border-radius:50%;
  border:1px solid rgba(199,125,255,.2);animation:rotate-ring 8s linear infinite;
}
.quantum-ring::before{
  content:'';position:absolute;top:-3px;left:50%;
  width:6px;height:6px;border-radius:50%;
  background:#c77dff;box-shadow:0 0 10px #c77dff;
}
@keyframes rotate-ring{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.avatar-img{
  position:absolute;top:0;left:0;width:220px;height:275px;
  object-fit:cover;border-radius:110px 110px 74px 74px;
  transition:opacity .08s ease;
  filter:drop-shadow(0 0 18px rgba(199,125,255,.4));
}
#img-closed{opacity:1}
#img-open{opacity:0}
.avatar-container.speaking #img-closed{opacity:0}
.avatar-container.speaking #img-open{opacity:1}

/* ── ステータス ── */
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:background .3s}
.status-dot.active{background:#7fff7f;box-shadow:0 0 8px #7fff7f;animation:blink 1s ease-in-out infinite}
.status-dot.talking{background:#ff9de2;box-shadow:0 0 8px #ff9de2;animation:blink .5s ease-in-out infinite}
.status-dot.connecting{background:#ffdd77;box-shadow:0 0 8px #ffdd77;animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#status-text{color:rgba(255,255,255,.7);font-size:12px}

/* ── 波形 ── */
.wave-container{display:flex;align-items:center;gap:3px;height:28px;margin-bottom:16px;opacity:0;transition:opacity .3s}
.wave-container.active{opacity:1}
.wave-bar{width:4px;background:linear-gradient(to top,#c77dff,#ff9de2);border-radius:2px;animation:wave 1s ease-in-out infinite;height:6px}
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.1s}
.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.3s}
.wave-bar:nth-child(5){animation-delay:.4s}.wave-bar:nth-child(6){animation-delay:.3s}
.wave-bar:nth-child(7){animation-delay:.2s}.wave-bar:nth-child(8){animation-delay:.1s}
.wave-bar:nth-child(9){animation-delay:0s}
@keyframes wave{0%,100%{height:6px}50%{height:26px}}

/* ── ボタン群 ── */
.btn-row{display:flex;gap:16px;align-items:center;margin-bottom:10px}

.btn-talk{
  width:68px;height:68px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#c77dff,#ff9de2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 28px rgba(199,125,255,.5);transition:all .3s;
}
.btn-talk:hover{transform:scale(1.08);box-shadow:0 0 40px rgba(199,125,255,.7)}
.btn-talk:active{transform:scale(.95)}
.btn-talk.recording{background:linear-gradient(135deg,#ff5555,#ff9de2);animation:rec-pulse 1s ease-in-out infinite}
.btn-talk:disabled{opacity:.4;cursor:not-allowed;transform:none}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 28px rgba(255,85,85,.5)}50%{box-shadow:0 0 48px rgba(255,85,85,.8)}}

.btn-label{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:16px;letter-spacing:1px}

/* ── チャットエリア ── */
.chat-area{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(199,125,255,.2);border-radius:16px;
  padding:14px;margin-bottom:12px;max-height:200px;overflow-y:auto;
  display:none;
}
.chat-area.visible{display:block}
.chat-msg{font-size:12px;margin-bottom:8px;line-height:1.6;padding:8px 12px;border-radius:10px}
.chat-msg.user{background:rgba(199,125,255,.15);border-left:3px solid #c77dff}
.chat-msg.sydney{background:rgba(121,208,255,.1);border-left:3px solid #79d0ff}
.chat-msg .who{font-size:10px;opacity:.6;margin-bottom:2px}

/* ── テキスト入力 ── */
.text-input-row{display:flex;gap:8px;width:100%;margin-bottom:12px}
#text-input{
  flex:1;padding:12px 14px;background:rgba(255,255,255,.08);
  border:1px solid rgba(199,125,255,.3);border-radius:12px;
  color:#fff;font-size:14px;font-family:'Zen Maru Gothic',sans-serif;
  outline:none;
}
#text-input:focus{border-color:#c77dff}
#text-input::placeholder{color:rgba(255,255,255,.3)}
#text-send{
  padding:12px 18px;background:linear-gradient(135deg,#c77dff,#ff9de2);
  border:none;border-radius:12px;color:#fff;font-size:14px;cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;white-space:nowrap;
}
#text-send:disabled{opacity:.4;cursor:not-allowed}

/* ── PDFボタン ── */
#btn-pdf{
  display:none;padding:10px 20px;
  background:rgba(255,255,255,.08);border:1px solid rgba(199,125,255,.4);
  border-radius:10px;color:#c77dff;font-size:12px;cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;margin-bottom:12px;
  transition:background .2s;
}
#btn-pdf:hover{background:rgba(199,125,255,.15)}
#btn-pdf.visible{display:block}

/* ── エラー ── */
.error-msg{
  background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);
  border-radius:10px;padding:10px 14px;font-size:12px;color:#ffaaaa;
  text-align:center;display:none;margin-bottom:10px;width:100%;
}

.footer{margin-top:auto;padding:16px 0;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>

<!-- 名前入力画面 -->
<div id="name-screen">
  <h2>SYDNEY</h2>
  <p>量子脳コーチングへようこそ！<br>お名前を教えてください</p>
  <input id="name-input" type="text" placeholder="お名前" maxlength="20">
  <button id="name-submit" onclick="startWithName()">シドニーと話す ✨</button>
</div>

<!-- メイン画面 -->
<div class="container" id="main-screen" style="display:none">
  <div class="title">量子脳コーチング</div>
  <div class="name-logo">SYDNEY</div>

  <div class="avatar-container" id="avatar">
    <div class="avatar-glow"></div>
    <div class="quantum-ring"></div>
    <img id="img-closed" class="avatar-img" src="sydney_closed.png" alt="シドニー">
    <img id="img-open"   class="avatar-img" src="sydney_open.png"   alt="シドニー話中">
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">タップして話しかけてね！</span>
  </div>

  <div class="wave-container" id="wave">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <div class="btn-row">
    <button class="btn-talk" id="btn-talk" onclick="toggleSession()">🎤</button>
  </div>
  <div class="btn-label" id="btn-label">タップして開始</div>

  <!-- チャット表示 -->
  <div class="chat-area" id="chat-area"></div>

  <!-- テキスト入力 -->
  <div class="text-input-row">
    <input id="text-input" type="text" placeholder="テキストで送る..." disabled>
    <button id="text-send" onclick="sendText()" disabled>送信</button>
  </div>

  <!-- PDF保存ボタン -->
  <button id="btn-pdf" onclick="downloadPdf()">📄 会話をPDFで保存</button>

  <div class="error-msg" id="error-msg"></div>
  <div class="footer">Quantum Brain Coaching AI</div>
</div>

<script>
// =============================================
// 設定
// =============================================
let clientName = '';
let sessionId  = null;
let ws         = null;
let isActive   = false;
let audioCtx   = null;
let audioQueue = [];
let isPlaying  = false;
let lipTimer   = null;
let micStream  = null;
let micSrc     = null;
let micProc    = null;

const $ = id => document.getElementById(id);
const avatar    = $('avatar');
const statusDot = $('status-dot');
const statusTxt = $('status-text');
const waveEl    = $('wave');
const btnTalk   = $('btn-talk');
const btnLabel  = $('btn-label');
const errorEl   = $('error-msg');
const chatArea  = $('chat-area');
const textInput = $('text-input');
const textSend  = $('text-send');
const btnPdf    = $('btn-pdf');

// ── 名前入力 ──
function startWithName() {
  clientName = $('name-input').value.trim() || '匿名';
  $('name-screen').style.display = 'none';
  $('main-screen').style.display = 'flex';
}
$('name-input').addEventListener('keydown', e => { if(e.key==='Enter') startWithName(); });

// ── ステータス ──
function setStatus(state, text) {
  statusTxt.textContent = text;
  statusDot.className = 'status-dot' + (state ? ' '+state : '');
}
function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  setTimeout(()=>errorEl.style.display='none', 6000);
}

// ── チャットログ ──
function addChat(role, text) {
  chatArea.classList.add('visible');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = `<div class="who">${role==='user'?'👤 '+clientName:'🌟 シドニー'}</div>${text}`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── リップシンク ──
function startLip() {
  let open = false;
  lipTimer = setInterval(()=>{
    open = !open;
    avatar.classList.toggle('speaking', open);
  }, 160);
}
function stopLip() {
  if(lipTimer){ clearInterval(lipTimer); lipTimer=null; }
  avatar.classList.remove('speaking');
}

// ── セッション開始/停止 ──
async function toggleSession() {
  if(isActive) stopSession(); else await startSession();
}

async function startSession() {
  btnTalk.disabled = true;
  setStatus('connecting', '接続中...');

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx  = new AudioContext({ sampleRate: 16000 });

    const protocol = location.protocol==='https:' ? 'wss' : 'ws';
    const nameEnc  = encodeURIComponent(clientName);
    ws = new WebSocket(`${protocol}://${location.host}?name=${nameEnc}`);

    ws.onopen = () => setStatus('connecting', 'シドニーを呼んでいます...');

    ws.onmessage = async (ev) => {
      let data; try{ data=JSON.parse(ev.data); }catch{ return; }

      if(data.error){ showError(data.error); stopSession(); return; }

      if(data.geminiClosed){
        if(isActive){ showError(`切断 (コード:${data.code})`); stopSession(); }
        return;
      }

      if(data.setupComplete){
        sessionId = data.sessionId;
        isActive  = true;
        btnTalk.disabled = false;
        btnTalk.textContent = '⏹️';
        btnTalk.classList.add('recording');
        btnLabel.textContent = 'タップして終了';
        waveEl.classList.add('active');
        textInput.disabled = false;
        textSend.disabled  = false;
        setStatus('active', clientName+'さん、話しかけてね♪');
        startMic();
        return;
      }

      // シドニーの音声・テキスト
      if(data.serverContent?.modelTurn?.parts){
        for(const p of data.serverContent.modelTurn.parts){
          if(p.inlineData?.mimeType?.startsWith('audio/')){
            const raw = atob(p.inlineData.data);
            const buf = new ArrayBuffer(raw.length);
            const view = new Uint8Array(buf);
            for(let i=0;i<raw.length;i++) view[i]=raw.charCodeAt(i);
            audioQueue.push(buf);
            if(!isPlaying) playNext();
          }
          if(p.text) addChat('sydney', p.text);
        }
      }

      if(data.serverContent?.turnComplete){
        setStatus('active', '話しかけてね！');
        if(sessionId) btnPdf.classList.add('visible');
      }
    };

    ws.onerror = () => { showError('接続エラー'); stopSession(); };
    ws.onclose = () => { if(isActive) stopSession(); };

  } catch(e) {
    showError('マイクが必要です: '+e.message);
    btnTalk.disabled = false;
    setStatus('', 'タップして話しかけてね！');
  }
}

// ── マイクキャプチャ ──
function startMic() {
  micSrc  = audioCtx.createMediaStreamSource(micStream);
  micProc = audioCtx.createScriptProcessor(4096, 1, 1);
  micProc.onaudioprocess = e => {
    if(!isActive || !ws || ws.readyState!==WebSocket.OPEN) return;
    const f32 = e.inputBuffer.getChannelData(0);
    const i16 = new Int16Array(f32.length);
    for(let i=0;i<f32.length;i++) i16[i]=Math.max(-32768,Math.min(32767,f32[i]*32768));
    const b64 = btoa(String.fromCharCode(...new Uint8Array(i16.buffer)));
    ws.send(JSON.stringify({ realtime_input:{ media_chunks:[{ mime_type:'audio/pcm', data:b64 }] } }));
  };
  micSrc.connect(micProc);
  micProc.connect(audioCtx.destination);
}

// ── 音声再生 ──
function playNext() {
  if(!audioQueue.length){ isPlaying=false; stopLip(); setStatus('active','話しかけてね！'); return; }
  isPlaying = true;
  startLip();
  setStatus('talking','シドニーが話しているよ♪');
  const buf = audioQueue.shift();
  try{
    const i16 = new Int16Array(buf);
    const f32 = new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
    const ab = audioCtx.createBuffer(1,f32.length,24000);
    ab.getChannelData(0).set(f32);
    const src = audioCtx.createBufferSource();
    src.buffer = ab;
    src.connect(audioCtx.destination);
    src.onended = playNext;
    src.start();
  }catch{ playNext(); }
}

// ── テキスト送信 ──
function sendText() {
  const text = textInput.value.trim();
  if(!text || !ws || ws.readyState!==WebSocket.OPEN) return;
  addChat('user', text);
  ws.send(JSON.stringify({
    clientText: text,
    client_content: { parts:[{ text }], turn_complete: true }
  }));
  textInput.value = '';
}
textInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendText(); });

// ── PDF保存 ──
function downloadPdf() {
  if(!sessionId) return;
  window.open(`/api/pdf/${sessionId}`, '_blank');
}

// ── セッション停止 ──
function stopSession() {
  isActive = false;
  if(micProc){ micProc.disconnect(); micProc=null; }
  if(micSrc) { micSrc.disconnect();  micSrc=null;  }
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if(ws && ws.readyState===WebSocket.OPEN) ws.close();
  ws = null;
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
  audioQueue=[];isPlaying=false;
  stopLip();
  waveEl.classList.remove('active');
  textInput.disabled = true;
  textSend.disabled  = true;
  btnTalk.disabled   = false;
  btnTalk.textContent = '🎤';
  btnTalk.classList.remove('recording');
  btnLabel.textContent = 'タップして開始';
  setStatus('','タップして話しかけてね！');
  if(sessionId) btnPdf.classList.add('visible');
}
</script>
</body>
</html>
